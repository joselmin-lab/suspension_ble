name: Build Flutter App (Android & iOS)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite ejecutar la compilación manualmente con un botón

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # ubuntu compila Android, macos compila iOS
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output-name: AMS_BT_Android_APK
            output-path: build/app/outputs/flutter-apk/app-release.apk
          - os: macos-latest
            output-name: AMS_BT_iOS_Build
            output-path: build/ios/iphoneos/Runner.app

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Construir Android APK
        if: matrix.os == 'ubuntu-latest'
        run: flutter build apk --release

      - name: Construir iOS (Sin firma)
        if: matrix.os == 'macos-latest'
        run: flutter build ios --release --no-codesign

      - name: Subir archivo generado (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output-name }}
          path: ${{ matrix.output-path }}